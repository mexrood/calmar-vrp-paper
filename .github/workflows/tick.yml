name: vrp-tick

# DISABLED schedule: the live book now ticks every 15 min on Fly.io (always-on
# process, see server.ts + DEPLOY.md). GitHub cron was throttled to ~every 3h and
# would diverge from the Fly volume's state, so we keep this manual-only as a backup.
on:
  workflow_dispatch: {}   # manual backup only — Fly is the source of truth

permissions:
  contents: write

concurrency:
  group: vrp-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Tick the book
        run: npm run tick

      - name: Commit updated state
        run: |
          git config user.name "vrp-bot"
          git config user.email "vrp-bot@users.noreply.github.com"
          git add data/vrp-paper.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "tick: mark VRP book $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
