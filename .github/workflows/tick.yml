name: vrp-tick

# Two triggers so the book NEVER freezes:
#   • schedule        — GitHub's built-in cron, the always-on baseline (throttled to
#                        ~hourly under load, but never dead). Keeps ticking with zero setup.
#   • workflow_dispatch — for manual runs AND an optional external scheduler
#                        (cron-job.org) if you want punctual 15-min ticks. See SETUP-CRON.md.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: vrp-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Tick the book
        run: npm run tick

      - name: Commit updated state
        run: |
          git config user.name "vrp-bot"
          git config user.email "vrp-bot@users.noreply.github.com"
          git add data/vrp-paper.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "tick: mark VRP book $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
