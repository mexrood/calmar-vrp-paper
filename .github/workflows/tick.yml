name: vrp-tick

# Ticked by an EXTERNAL scheduler (cron-job.org) hitting the workflow_dispatch API
# every 15 min — punctual, unlike GitHub's throttled built-in cron. Each run marks
# the book and commits data/vrp-paper.json. GitHub Pages serves the dashboard from
# the same file. See SETUP-CRON.md.
on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: vrp-tick
  cancel-in-progress: false

jobs:
  tick:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Tick the book
        run: npm run tick

      - name: Commit updated state
        run: |
          git config user.name "vrp-bot"
          git config user.email "vrp-bot@users.noreply.github.com"
          git add data/vrp-paper.json
          if git diff --staged --quiet; then
            echo "no state change"
          else
            git commit -m "tick: mark VRP book $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
