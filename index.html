<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRP Paper Book — Calmar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:    #0a0a0a;
    --panel: #0f0f0e;
    --text:  #f0ede8;
    --meta:  #5a5a55;
    --line:  rgba(240,237,232,0.12);
    --up:    #6fbf86;
    --down:  #d9544f;
    --accent: var(--up);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { -webkit-font-smoothing: antialiased; }
  body {
    background: var(--bg); color: var(--text);
    font-family: "Space Mono", monospace;
    min-height: 100vh; overflow-x: hidden;
  }
  .canvas { padding-inline: clamp(1.25rem, 6vw, 5rem); }

  /* nav */
  nav {
    position: fixed; inset: 0 0 auto 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 1.1rem clamp(1.25rem, 6vw, 5rem);
    font-family: "Syne", sans-serif; font-weight: 700;
    font-size: clamp(0.62rem, 0.85vw, 0.78rem);
    letter-spacing: 0.14em; text-transform: uppercase;
    mix-blend-mode: difference;
  }
  nav .brand span { color: var(--meta); }
  .status { display: flex; align-items: center; gap: 0.55rem; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--up);
    box-shadow: 0 0 0 0 rgba(111,191,134,0.5); animation: pulse 2.4s infinite; }
  @keyframes pulse { 0%{box-shadow:0 0 0 0 rgba(111,191,134,0.45);} 70%{box-shadow:0 0 0 8px rgba(111,191,134,0);} 100%{box-shadow:0 0 0 0 rgba(111,191,134,0);} }

  /* hero */
  .hero { padding-top: clamp(6rem, 16vh, 11rem); padding-bottom: clamp(2rem, 5vw, 4rem); }
  .hero .label {
    font-family: "Syne", sans-serif; font-weight: 700;
    font-size: clamp(0.65rem, 0.9vw, 0.8rem);
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--meta);
    display: flex; gap: 1.2rem; align-items: baseline; margin-bottom: 1.2rem;
  }
  .hero .label b { color: var(--text); font-weight: 700; }
  .equity {
    font-family: "Syne", sans-serif; font-weight: 800;
    font-size: clamp(3.4rem, 14vw, 13rem); line-height: 0.84;
    letter-spacing: -0.045em; font-variant-numeric: tabular-nums;
  }
  .delta {
    margin-top: 1rem; font-size: clamp(1rem, 2.6vw, 2.1rem);
    font-weight: 700; letter-spacing: -0.01em; color: var(--accent);
    display: flex; gap: 1.4rem; align-items: baseline; flex-wrap: wrap;
  }
  .delta .sub { font-size: clamp(0.7rem,1vw,0.9rem); color: var(--meta); letter-spacing: 0.04em; }

  /* chart */
  .chart-wrap { position: relative; margin-top: clamp(1.5rem,4vw,3rem); }
  svg.chart { width: 100%; height: clamp(220px, 34vh, 420px); display: block; overflow: visible; }
  .baseline-label { font-size: 0.7rem; fill: var(--meta); font-family: "Space Mono", monospace; }

  /* sections */
  .divider { border-top: 1px solid var(--line); }
  section.block { padding-block: clamp(2.2rem, 5vw, 4rem); }
  .sec-head {
    display: grid; grid-template-columns: 3.5rem 1fr; gap: 1.5rem; align-items: baseline;
    margin-bottom: 2rem;
  }
  .sec-num { font-family:"Syne",sans-serif; font-weight:700; color: var(--meta); font-size: 0.8rem; letter-spacing:0.1em; }
  .sec-title { font-family:"Syne",sans-serif; font-weight:700; font-size: clamp(1.2rem,2.4vw,1.9rem); letter-spacing: -0.02em; }

  /* stats grid */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--line); }
  .stat { background: var(--bg); padding: 1.6rem 1.4rem; }
  .stat .k { font-family:"Syne",sans-serif; font-size: 0.62rem; letter-spacing: 0.16em; text-transform: uppercase; color: var(--meta); }
  .stat .v { margin-top: 0.7rem; font-size: clamp(1.1rem,2vw,1.6rem); font-weight: 700; letter-spacing: -0.01em; font-variant-numeric: tabular-nums; }
  .stat .v small { font-size: 0.62em; color: var(--meta); font-weight: 400; }

  /* legs */
  .leg-row, .tick-row {
    display: grid; align-items: baseline; gap: 1.2rem;
    padding-block: 1.05rem; border-top: 1px solid var(--line);
    font-size: clamp(0.74rem, 1vw, 0.92rem);
  }
  .leg-row { grid-template-columns: 5.5rem 4rem 1fr auto auto; }
  .tick-row { grid-template-columns: 1fr auto auto auto; }
  .leg-row:last-child, .tick-row:last-child { border-bottom: 1px solid var(--line); }
  .tag { font-family:"Syne",sans-serif; font-weight:700; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase;
    padding: 0.22rem 0.5rem; border:1px solid var(--line); border-radius: 2px; }
  .tag.short { color: var(--down); border-color: rgba(217,84,79,0.4); }
  .tag.long  { color: var(--up);   border-color: rgba(111,191,134,0.4); }
  .muted { color: var(--meta); }
  .pos { color: var(--up); } .neg { color: var(--down); }
  .num { font-variant-numeric: tabular-nums; }

  footer { padding-block: 3rem 4rem; color: var(--meta); font-size: 0.72rem; line-height: 1.7; }
  footer a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--line); }
  .err { padding: 8rem 0; text-align:center; color: var(--meta); font-size: 0.9rem; }

  @media (max-width: 760px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .leg-row { grid-template-columns: 4.5rem 1fr auto; }
    .leg-row .iv-col, .tick-row .delta-col { display: none; }
    .sec-head { grid-template-columns: 2.5rem 1fr; gap: 0.8rem; }
  }
</style>
</head>
<body>
  <nav>
    <div class="brand">CALMAR <span>/ VRP PAPER BOOK</span></div>
    <div class="status"><span class="dot"></span> LIVE · DERIBIT</div>
  </nav>

  <main id="app" class="canvas"><div class="err">loading live book…</div></main>

<script>
const CAPITAL = 10000;
const fmtUSD = (n, sign=false) => (sign && n>=0?"+":"") + (n<0?"-":"") + "$" + Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0});
const fmtPct = (n) => (n>=0?"+":"") + n.toFixed(2) + "%";

function chartSVG(history){
  if(history.length < 2) return '<svg class="chart"></svg>';
  const W=1000, H=300, padX=4, padY=24;
  const eq = history.map(h=>h.equity);
  const lo = Math.min(...eq, CAPITAL), hi = Math.max(...eq, CAPITAL);
  const span = (hi-lo)||1;
  const x = i => padX + i*(W-2*padX)/(history.length-1);
  const y = v => padY + (1-(v-lo)/span)*(H-2*padY);
  const pts = history.map((h,i)=>[x(i),y(h.equity)]);
  const line = pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area = line + ` L ${x(history.length-1).toFixed(1)} ${H-padY} L ${padX} ${H-padY} Z`;
  const baseY = y(CAPITAL).toFixed(1);
  const last = history[history.length-1].equity;
  const up = last >= CAPITAL;
  const col = up ? "var(--up)" : "var(--down)";
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="${col}" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="${col}" stop-opacity="0"/>
    </linearGradient></defs>
    <line x1="${padX}" x2="${W-padX}" y1="${baseY}" y2="${baseY}" stroke="var(--meta)" stroke-width="1" stroke-dasharray="3 5" opacity="0.6"/>
    <text class="baseline-label" x="${padX+4}" y="${(+baseY)-7}">$10,000 · start</text>
    <path d="${area}" fill="url(#g)"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" vector-effect="non-scaling-stroke"/>
    <circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="4" fill="${col}"/>
  </svg>`;
}

function render(s){
  const h = s.history && s.history.length ? s.history[s.history.length-1] : null;
  const equity = h ? h.equity : CAPITAL;
  const pnl = equity - CAPITAL;
  const pct = pnl/CAPITAL*100;
  const up = pnl >= 0;
  document.documentElement.style.setProperty("--accent", up ? "var(--up)" : "var(--down)");

  const dteH = h ? h.dte : (s.expiry - Date.now())/864e5;
  const opt = h ? h.optionPnlUSD : 0, hedge = h ? h.hedgePnlUSD : 0, delta = h ? h.netDeltaBTC : 0;
  const spot = h ? h.spot : s.spotAtOpen;

  const legRows = s.legs.map(l=>`
    <div class="leg-row">
      <span><span class="tag ${l.side}">${l.side}</span></span>
      <span class="muted iv-col">${l.type.toUpperCase()}</span>
      <span class="num">$${l.strike.toLocaleString()}</span>
      <span class="num muted">${l.entryFillBTC.toFixed(4)} BTC</span>
      <span class="num muted iv-col">IV ${Math.round(l.entryIV)}%</span>
    </div>`).join("");

  const ticks = (s.history||[]).slice(-14).reverse().map(r=>{
    const p = r.equity - CAPITAL; const cls = p>=0?"pos":"neg";
    return `<div class="tick-row">
      <span class="muted">${r.ts.slice(5,16).replace("T"," ")}</span>
      <span class="num">$${Math.round(r.spot).toLocaleString()}</span>
      <span class="num ${cls}">${fmtUSD(p,true)}</span>
      <span class="num muted delta-col">Δ ${r.netDeltaBTC.toFixed(3)}</span>
    </div>`;
  }).join("");

  document.getElementById("app").innerHTML = `
    <section class="hero">
      <div class="label">01 — Equity · <b>$${CAPITAL.toLocaleString()}</b> virtual · short-vol BTC</div>
      <div class="equity">${fmtUSD(equity).replace("$","$")}</div>
      <div class="delta">
        <span>${fmtUSD(pnl,true)}</span>
        <span>${fmtPct(pct)}</span>
        <span class="sub">${s.history.length} ticks · since ${s.openedAt.slice(0,10)}</span>
      </div>
      <div class="chart-wrap">${chartSVG(s.history||[])}</div>
    </section>

    <section class="block divider">
      <div class="stats">
        <div class="stat"><div class="k">Premium collected</div><div class="v pos">${fmtUSD(s.premiumCollectedUSD,true)}</div></div>
        <div class="stat"><div class="k">Days to expiry</div><div class="v">${dteH.toFixed(1)}<small> d · ${s.expiryDate}</small></div></div>
        <div class="stat"><div class="k">Net delta</div><div class="v">${delta.toFixed(3)}<small> BTC</small></div></div>
        <div class="stat"><div class="k">BTC spot</div><div class="v">$${Math.round(spot).toLocaleString()}</div></div>
      </div>
    </section>

    <section class="block divider">
      <div class="sec-head"><div class="sec-num">02</div><div class="sec-title">Position</div></div>
      <div>${legRows}</div>
      <div style="margin-top:1.6rem; display:flex; gap:2.5rem; flex-wrap:wrap; font-size:0.82rem;">
        <span class="muted">Option P&amp;L <span class="${opt>=0?'pos':'neg'} num">${fmtUSD(opt,true)}</span></span>
        <span class="muted">Hedge P&amp;L <span class="${hedge>=0?'pos':'neg'} num">${fmtUSD(hedge,true)}</span></span>
      </div>
    </section>

    <section class="block divider">
      <div class="sec-head"><div class="sec-num">03</div><div class="sec-title">Tick history</div></div>
      <div class="tick-row" style="border-top:none; color:var(--meta); font-family:Syne,sans-serif; font-size:0.62rem; letter-spacing:0.12em; text-transform:uppercase;">
        <span>Time · UTC</span><span>Spot</span><span>P&amp;L</span><span class="delta-col">Net Δ</span>
      </div>
      ${ticks || '<div class="muted" style="padding:1rem 0;">no ticks yet</div>'}
    </section>

    <footer class="divider">
      Virtual short-volatility book on live Deribit quotes · sells ATM straddle, buys OTM put hedge, delta-hedged.<br/>
      Ticks hourly via GitHub Actions. Auto-refreshes every 60s · pull the repo for the latest cloud ticks.<br/>
      <span class="muted">No real money. P&amp;L is a coin-margined USD approximation.</span>
    </footer>`;
}

async function loadData(){
  try{
    const res = await fetch("./data/vrp-paper.json?_=" + Date.now());
    if(!res.ok) throw new Error(res.status);
    render(await res.json());
  }catch(e){
    document.getElementById("app").innerHTML =
      '<div class="err">could not load data/vrp-paper.json<br/><br/>serve the folder over http (npm run dash), not file://</div>';
  }
}
loadData();
setInterval(loadData, 60000);
</script>
</body>
</html>
