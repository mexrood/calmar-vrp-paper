<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VRP Multi-Asset — Calmar</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{ --bg:#0a0a0a; --text:#f0ede8; --meta:#5a5a55; --line:rgba(240,237,232,0.12); --up:#6fbf86; --down:#d9544f; --accent:var(--up); }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-font-smoothing:antialiased}
  body{background:var(--bg);color:var(--text);font-family:"Space Mono",monospace;min-height:100vh;overflow-x:hidden}
  .canvas{padding-inline:clamp(1.25rem,6vw,5rem)}
  nav{position:fixed;inset:0 0 auto 0;z-index:100;display:flex;justify-content:space-between;align-items:center;
    padding:1.1rem clamp(1.25rem,6vw,5rem);font-family:"Syne",sans-serif;font-weight:700;font-size:clamp(0.62rem,0.85vw,0.78rem);
    letter-spacing:0.14em;text-transform:uppercase;mix-blend-mode:difference}
  nav .brand span{color:var(--meta)}
  .tabs{display:flex;gap:0.4rem;align-items:center}
  .tabs button{font-family:"Syne",sans-serif;font-weight:700;font-size:clamp(0.58rem,0.8vw,0.74rem);letter-spacing:0.1em;text-transform:uppercase;
    color:var(--meta);background:none;border:1px solid transparent;padding:0.4rem 0.7rem;border-radius:2px;cursor:pointer;transition:color .2s,border-color .2s}
  .tabs button:hover{color:var(--text)}
  .tabs button.active{color:var(--text);border-color:var(--line)}
  .tabs button.soon{opacity:0.55}
  .status{display:flex;align-items:center;gap:0.55rem}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--up);animation:pulse 2.4s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(111,191,134,0.45)}70%{box-shadow:0 0 0 8px rgba(111,191,134,0)}100%{box-shadow:0 0 0 0 rgba(111,191,134,0)}}

  .hero{padding-top:clamp(6rem,16vh,11rem);padding-bottom:clamp(1.5rem,4vw,3rem)}
  .hero .label{font-family:"Syne",sans-serif;font-weight:700;font-size:clamp(0.65rem,0.9vw,0.8rem);
    letter-spacing:0.18em;text-transform:uppercase;color:var(--meta);display:flex;gap:1.2rem;align-items:baseline;margin-bottom:1.2rem;flex-wrap:wrap}
  .hero .label b{color:var(--text)}
  .equity{font-family:"Syne",sans-serif;font-weight:800;font-size:clamp(3rem,12vw,11rem);line-height:0.84;letter-spacing:-0.045em;font-variant-numeric:tabular-nums}
  .delta{margin-top:1rem;font-size:clamp(1rem,2.6vw,2.1rem);font-weight:700;letter-spacing:-0.01em;color:var(--accent);display:flex;gap:1.4rem;align-items:baseline;flex-wrap:wrap}
  .delta .sub{font-size:clamp(0.7rem,1vw,0.9rem);color:var(--meta);letter-spacing:0.04em}
  .pstatus{margin-top:1.2rem;font-size:clamp(0.78rem,1.1vw,0.95rem);color:var(--text);line-height:1.5;max-width:62ch}

  .chart-wrap{position:relative;margin-top:clamp(1.5rem,4vw,3rem)}
  svg.chart{width:100%;height:clamp(180px,28vh,340px);display:block;overflow:visible}
  .baseline-label{font-size:0.7rem;fill:var(--meta);font-family:"Space Mono",monospace}

  .divider{border-top:1px solid var(--line)}
  section.block{padding-block:clamp(2.2rem,5vw,4rem)}
  .sec-head{display:grid;grid-template-columns:3.5rem 1fr;gap:1.5rem;align-items:baseline;margin-bottom:2rem}
  .sec-num{font-family:"Syne",sans-serif;font-weight:700;color:var(--meta);font-size:0.8rem;letter-spacing:0.1em}
  .sec-title{font-family:"Syne",sans-serif;font-weight:700;font-size:clamp(1.2rem,2.4vw,1.9rem);letter-spacing:-0.02em}

  /* leaderboard */
  .lb-row{display:grid;grid-template-columns:2rem 4rem 1fr 7rem 6rem;align-items:center;gap:1rem;
    padding-block:1.1rem;border-top:1px solid var(--line);font-size:clamp(0.78rem,1vw,0.95rem)}
  .lb-row:last-child{border-bottom:1px solid var(--line)}
  .lb-rank{font-family:"Syne",sans-serif;font-weight:700;color:var(--meta);font-size:0.8rem}
  .lb-sym{font-family:"Syne",sans-serif;font-weight:800;font-size:clamp(1rem,1.6vw,1.4rem);letter-spacing:-0.01em}
  .lb-bar{position:relative;height:6px;background:var(--line)}
  .lb-bar .fill{position:absolute;top:0;height:100%;transition:all .6s cubic-bezier(0.16,1,0.3,1)}
  .lb-bar .mid{position:absolute;left:50%;top:-3px;bottom:-3px;width:1px;background:var(--meta);opacity:0.5}
  .lb-pnl{text-align:right;font-variant-numeric:tabular-nums;font-weight:700}
  .lb-meta{text-align:right;font-size:0.7rem;color:var(--meta);font-variant-numeric:tabular-nums}
  .pos{color:var(--up)} .neg{color:var(--down)} .muted{color:var(--meta)} .num{font-variant-numeric:tabular-nums}

  /* diversification stats */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line)}
  .stat{background:var(--bg);padding:1.6rem 1.4rem}
  .stat .k{font-family:"Syne",sans-serif;font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase;color:var(--meta)}
  .stat .v{margin-top:0.7rem;font-size:clamp(1.1rem,2vw,1.6rem);font-weight:700;letter-spacing:-0.01em;font-variant-numeric:tabular-nums}
  .stat .v small{font-size:0.6em;color:var(--meta);font-weight:400}

  .log>summary{list-style:none;cursor:pointer;display:flex;align-items:baseline;gap:1rem;user-select:none}
  .log>summary::-webkit-details-marker{display:none}
  .log>summary .log-hint{color:var(--meta);font-size:0.72rem}
  .log>summary:hover .log-hint{color:var(--text)}
  .tick-row{display:grid;grid-template-columns:1fr auto auto;gap:1.2rem;padding-block:0.9rem;border-top:1px solid var(--line);font-size:0.8rem}
  footer{padding-block:3rem 4rem;color:var(--meta);font-size:0.72rem;line-height:1.7}
  .err{padding:8rem 0;text-align:center;color:var(--meta)}
  @media(max-width:680px){ .stats{grid-template-columns:1fr} .lb-row{grid-template-columns:1.6rem 3.2rem 1fr 5rem;gap:0.7rem} .lb-meta{display:none} }
</style>
</head>
<body>
  <nav>
    <div class="brand">CALMAR <span>/ LAB</span></div>
    <div class="tabs">
      <button data-tab="vrp" class="active">VRP · Multi-Asset</button>
      <button data-tab="carry" class="soon">Carry-Stack</button>
      <button data-tab="pendle" class="soon">Pendle</button>
    </div>
    <div class="status"><span class="dot"></span> LIVE</div>
  </nav>
  <main id="app" class="canvas"><div class="err">loading…</div></main>
<script>
const PER_BOOK = 10000;
const fmtUSD=(n,s=false)=>(s&&n>=0?"+":"")+(n<0?"-":"")+"$"+Math.abs(n).toLocaleString("en-US",{maximumFractionDigits:0});
const fmtPct=(n)=>(n>=0?"+":"")+n.toFixed(2)+"%";
const TZ="Europe/Chisinau";
const fmtTime=(iso)=>new Date(iso).toLocaleString("en-GB",{timeZone:TZ,day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}).replace(",","");
const fmtDate=(iso)=>new Date(iso).toLocaleDateString("en-CA",{timeZone:TZ});

function chartSVG(hist){
  if(hist.length<2) return '<svg class="chart"></svg>';
  const W=1000,H=300,padX=4,padY=24, base=PER_BOOK*0; // start total
  const vals=hist.map(h=>h.total);
  const START=hist[0].total; // first recorded ~ start
  const lo=Math.min(...vals,START),hi=Math.max(...vals,START),span=(hi-lo)||1;
  const x=i=>padX+i*(W-2*padX)/(hist.length-1);
  const y=v=>padY+(1-(v-lo)/span)*(H-2*padY);
  const pts=hist.map((h,i)=>[x(i),y(h.total)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const area=line+` L ${x(hist.length-1).toFixed(1)} ${H-padY} L ${padX} ${H-padY} Z`;
  const last=hist[hist.length-1].total, up=last>=START, col=up?"var(--up)":"var(--down)";
  const baseY=y(START).toFixed(1);
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <defs><linearGradient id="g" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${col}" stop-opacity="0.18"/><stop offset="100%" stop-color="${col}" stop-opacity="0"/></linearGradient></defs>
    <line x1="${padX}" x2="${W-padX}" y1="${baseY}" y2="${baseY}" stroke="var(--meta)" stroke-width="1" stroke-dasharray="3 5" opacity="0.6"/>
    <text class="baseline-label" x="${padX+4}" y="${(+baseY)-7}">$${Math.round(START).toLocaleString()} · start</text>
    <path d="${area}" fill="url(#g)"/>
    <path d="${line}" fill="none" stroke="${col}" stroke-width="2" vector-effect="non-scaling-stroke" stroke-linejoin="round"/>
    <circle cx="${pts[pts.length-1][0].toFixed(1)}" cy="${pts[pts.length-1][1].toFixed(1)}" r="4" fill="${col}"/>
  </svg>`;
}

function renderVRP(s){
  const h=s.history&&s.history.length?s.history[s.history.length-1]:null;
  const syms=Object.keys(s.books);
  const nBooks=syms.length||6;
  const START=nBooks*PER_BOOK;
  const total=h?h.total:START;
  const pnl=total-START, pct=pnl/START*100, up=pnl>=0;
  document.documentElement.style.setProperty("--accent",up?"var(--up)":"var(--down)");

  // per-asset rows
  const rows=syms.map(sym=>{
    const eq=h&&h.per[sym]!=null?h.per[sym]:PER_BOOK;
    const p=eq-PER_BOOK; const b=s.books[sym];
    return {sym,eq,p,pct:p/PER_BOOK*100,premium:b?b.premiumCollectedUSD:0,cycles:b?b.cycles:0,dte:b?(b.expiry-Date.now())/864e5:0};
  }).sort((a,b)=>b.p-a.p);

  const best=rows[0], worst=rows[rows.length-1];
  const maxAbs=Math.max(...rows.map(r=>Math.abs(r.p)),1);

  const lb=rows.map((r,i)=>{
    const w=Math.abs(r.p)/maxAbs*50; // % of half-width
    const fill=r.p>=0
      ? `left:50%;width:${w}%;background:var(--up)`
      : `right:50%;width:${w}%;background:var(--down)`;
    return `<div class="lb-row">
      <span class="lb-rank">${i+1}</span>
      <span class="lb-sym">${r.sym}</span>
      <span class="lb-bar"><span class="mid"></span><span class="fill" style="${fill}"></span></span>
      <span class="lb-pnl ${r.p>=0?'pos':'neg'}">${fmtUSD(r.p,true)} <span class="muted" style="font-weight:400">${fmtPct(r.pct)}</span></span>
      <span class="lb-meta">prem ${fmtUSD(r.premium)}<br/>${r.cycles} rolls · ${r.dte.toFixed(0)}d</span>
    </div>`;
  }).join("");

  const ticks=(s.history||[]).slice(-14).reverse().map(r=>{
    const p=r.total-START; return `<div class="tick-row">
      <span class="muted">${fmtTime(r.ts)}</span>
      <span class="num">$${Math.round(r.total).toLocaleString()}</span>
      <span class="num ${p>=0?'pos':'neg'}">${fmtUSD(p,true)}</span></div>`;
  }).join("");

  const statusText = !h ? "Waiting for the first mark…"
    : `Six short-vol books, $${PER_BOOK.toLocaleString()} each, started together — measuring which harvests best and whether the basket is smoother than any one. Best: <b>${best.sym} ${fmtUSD(best.p,true)}</b> · worst: <b>${worst.sym} ${fmtUSD(worst.p,true)}</b>. The portfolio sits between them — that gap IS the diversification.`;

  document.getElementById("app").innerHTML=`
    <section class="hero">
      <div class="label">01 — Portfolio · <b>${nBooks} assets × $${PER_BOOK.toLocaleString()}</b> · short-vol · started ${fmtDate(s.startedAt)}</div>
      <div class="equity">${fmtUSD(total).replace("$","$")}</div>
      <div class="delta"><span>${fmtUSD(pnl,true)}</span><span>${fmtPct(pct)}</span><span class="sub">${s.history.length} ticks · vs $${START.toLocaleString()} start</span></div>
      <div class="pstatus">${statusText}</div>
      <div class="chart-wrap">${chartSVG(s.history||[])}</div>
    </section>

    <section class="block divider">
      <div class="sec-head"><div class="sec-num">02</div><div class="sec-title">Leaderboard · which asset harvests best</div></div>
      ${lb}
    </section>

    <section class="block divider">
      <div class="sec-head"><div class="sec-num">03</div><div class="sec-title">Diversification</div></div>
      <div class="stats">
        <div class="stat"><div class="k">Best book</div><div class="v ${best.p>=0?'pos':'neg'}">${best.sym} ${fmtUSD(best.p,true)}</div></div>
        <div class="stat"><div class="k">Worst book</div><div class="v ${worst.p>=0?'pos':'neg'}">${worst.sym} ${fmtUSD(worst.p,true)}</div></div>
        <div class="stat"><div class="k">Portfolio (avg)</div><div class="v ${pnl>=0?'pos':'neg'}">${fmtUSD(pnl/nBooks,true)}<small> /book</small></div></div>
      </div>
      <p class="muted" style="margin-top:1.4rem;font-size:0.82rem;line-height:1.6;max-width:64ch">The portfolio return ≈ average of the books, but its <i>swings</i> should be smaller than the wildest single asset — different coins spike on different days. More independent bets = smoother ride. (Partial: in a broad crash they fall together.)</p>
    </section>

    <section class="block divider">
      <details class="log">
        <summary><span class="sec-num">04</span> <span class="sec-title">Tick log</span> <span class="log-hint">— portfolio total over time (is it working?)</span></summary>
        <div class="tick-row" style="border-top:none;color:var(--meta);font-family:Syne,sans-serif;font-size:0.62rem;letter-spacing:0.12em;text-transform:uppercase;margin-top:1.6rem"><span>Time · Chișinău</span><span>Total</span><span>P&amp;L</span></div>
        ${ticks||'<div class="muted" style="padding:1rem 0">no ticks yet</div>'}
      </details>
    </section>

    <footer class="divider">
      Six virtual short-volatility books (BTC, ETH, SOL, XRP, AVAX, TRX) on live Deribit quotes · sell ATM straddle + OTM put hedge, delta-hedged, auto-rolled every ~30d.<br/>
      Net of: option exchange fee (0.03%/contract, capped), bid/ask spread on entry, per-rehedge perp cost, and a conservative 10%/yr funding drag.<br/>
      <span class="muted">Approximations: BTC/ETH use a coin-margined USD model (alts are exact USDC-linear); hedged at tick frequency (~2h), not continuously; no margin/liquidation. No real money · ~6-month run.</span>
    </footer>`;
}
// ── tabs: VRP is live; new strategies get their own slot ──
const SOON = {
  carry: { title:"Carry-Stack", desc:"Delta-neutral carry-stacking (Ethena-style, self-run): long a yield-bearing asset (e.g. staked ETH) + short the perp, collecting funding AND staking yield on one neutral position — entered only when funding is rich. Stress-tested on the correlated tail (does funding flip while collateral depegs?). Paper book in research." },
  pendle:{ title:"Pendle · Fixed Income", desc:"On-chain fixed-vs-floating: lock a fixed yield via Principal Tokens when it prices above expected floating, or arbitrage Pendle implied APY against CEX/DeFi lending and T-bills. A new family (term structure of rates), not vol or funding. Snapshot in research." },
};
let activeTab = "vrp";
async function loadVRP(){
  try{ const r=await fetch("./data/vrp-multi.json?_="+Date.now()); if(!r.ok) throw 0; renderVRP(await r.json()); }
  catch(e){ document.getElementById("app").innerHTML='<div class="err">could not load data/vrp-multi.json</div>'; }
}
function renderSoon(tab){
  const s=SOON[tab];
  document.getElementById("app").innerHTML=`
    <section class="hero">
      <div class="label">— ${s.title} · paper book</div>
      <div class="equity" style="font-size:clamp(2rem,7vw,5rem);color:var(--meta)">In research</div>
      <p class="pstatus" style="margin-top:1.5rem">${s.desc}</p>
      <p class="muted" style="margin-top:1.4rem;font-size:0.82rem;line-height:1.6;max-width:62ch">It will live here as its own live paper book, $10k, net of all costs — comparable side-by-side with VRP. Building one strategy at a time, validated before it goes live. The VRP tab keeps running untouched.</p>
    </section>`;
}
function selectTab(tab){
  activeTab=tab;
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.toggle("active",b.dataset.tab===tab));
  if(tab==="vrp") loadVRP(); else renderSoon(tab);
}
document.querySelectorAll(".tabs button").forEach(b=>b.addEventListener("click",()=>selectTab(b.dataset.tab)));
selectTab("vrp");
setInterval(()=>{ if(activeTab==="vrp") loadVRP(); },60000);
</script>
</body>
</html>
